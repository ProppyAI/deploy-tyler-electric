name: Module Cron Jobs
# Scheduled trigger removed 2026-06-03 — the per-module cron loop is retired
# pending the dynamic client-standup redesign. Manual dispatch only for now.
on:
  workflow_dispatch:
    inputs:
      job_name:
        description: 'Run a specific job by name (optional)'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  cron:
    uses: ProppyAI/HARNESS/.github/workflows/module-cron.yml@main
    with:
      job_name: ${{ inputs.job_name || '' }}
