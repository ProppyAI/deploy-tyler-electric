# Calls the HARNESS daily maintenance pipeline.
# Drop this file into any ProppyAI repo.

name: "Daily Maintenance"

# Scheduled trigger removed 2026-06-03 — the per-repo daily maintenance loop
# is retired pending the dynamic client-standup redesign. Manual dispatch only.
on:
  workflow_dispatch:       # Manual trigger

jobs:
  maintenance:
    uses: ProppyAI/HARNESS/.github/workflows/daily-maintenance.yml@main
    with:
      run_browser_tests: false    # Set true for UI projects
      test_command: "npm test"    # Adjust per repo
    secrets: inherit
